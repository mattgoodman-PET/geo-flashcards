const CATEGORIES = [
  "All Topics",
  "Landscapes & Landforms",
  "Landscape Types",
  "Coastal Landforms",
  "Desert Landforms",
  "Mountain Landforms",
  "Geomorphic Processes",
  "Water Cycle",
  "Values of Landscapes",

  "Latitude & Longitude",

  "Practice Test",
  "2023 Practice Test"
];

// ============================================================
// MAIN APP
// ============================================================
function FlashcardApp() {
  const [mode, setMode] = useState("menu"); // menu, study, quiz, results
  const [category, setCategory] = useState("All Topics");
  const [questions, setQuestions] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [multiSelected, setMultiSelected] = useState([]);
  const [showAnswer, setShowAnswer] = useState(false);
  const [score, setScore] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [flipped, setFlipped] = useState(false);
  const [shuffled, setShuffled] = useState(false);
  const [maskRevealed, setMaskRevealed] = useState(false);

  const getFilteredQuestions = useCallback(() => {
    let qs = category === "All Topics"
      ? [...ALL_QUESTIONS]
      : ALL_QUESTIONS.filter(q => q.category === category);
    if (shuffled) {
      qs = qs.sort(() => Math.random() - 0.5);
    }
    return qs;
  }, [category, shuffled]);

  const startStudy = () => {
    setQuestions(getFilteredQuestions());
    setCurrentIdx(0);
    setFlipped(false);
    setMode("study");
  };

  const startQuiz = () => {
    const qs = getFilteredQuestions();
    setQuestions(qs);
    setCurrentIdx(0);
    setSelected(null);
    setMultiSelected([]);
    setShowAnswer(false);
    setScore(0);
    setAnswers([]);
    setMaskRevealed(false);
    setMode("quiz");
  };

  const handleQuizAnswer = () => {
    const q = questions[currentIdx];
    let isCorrect = false;

    if (q.type === "multi_select") {
      const sortedSel = [...multiSelected].sort();
      const sortedCorr = [...q.correct].sort();
      isCorrect = JSON.stringify(sortedSel) === JSON.stringify(sortedCorr);
    } else if (q.type === "fill_order") {
      isCorrect = JSON.stringify(multiSelected) === JSON.stringify(q.correct);
    } else {
      isCorrect = selected === q.correct;
    }

    if (isCorrect) setScore(s => s + 1);
    setAnswers(a => [...a, { questionId: q.id, correct: isCorrect, selected: q.type === "multi_select" || q.type === "fill_order" ? [...multiSelected] : selected }]);
    setShowAnswer(true);
  };

  const nextQuestion = () => {
    if (currentIdx < questions.length - 1) {
      setCurrentIdx(i => i + 1);
      setSelected(null);
      setMultiSelected([]);
      setShowAnswer(false);
      setMaskRevealed(false);
    } else {
      setMode("results");
    }
  };

  const q = questions[currentIdx];
  const progress = questions.length > 0 ? ((currentIdx + 1) / questions.length * 100) : 0;

  // ============================================================
  // RENDER
  // ============================================================
  
  // MENU
  if (mode === "menu") {
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"20px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:40,paddingTop:30}}>
            <div style={{fontSize:48,marginBottom:8}}>🌏</div>
            <h1 style={{color:"#e94560",fontSize:32,margin:0,fontWeight:800}}>Geography Flashcards</h1>
            <p style={{color:"#a8a8b3",fontSize:16,marginTop:8}}>Term 1 Cycle Test Revision</p>
            <p style={{color:"#7f8c8d",fontSize:13,marginTop:4}}>{ALL_QUESTIONS.length} questions covering all topics</p>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:30}}>
            {CATEGORIES.map(cat => {
              const count = cat === "All Topics" ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q=>q.category===cat).length;
              const isActive = category === cat;
              return (
                <button key={cat} onClick={() => setCategory(cat)}
                  style={{
                    padding:"12px 16px",textAlign:"left",
                    background: isActive ? "rgba(233,69,96,0.2)" : "rgba(255,255,255,0.05)",
                    border: isActive ? "2px solid #e94560" : "2px solid rgba(255,255,255,0.1)",
                    borderRadius:12,cursor:"pointer",transition:"all 0.2s",
                    color: isActive ? "#e94560" : "#ccc",fontSize:14,fontWeight: isActive ? 700 : 400
                  }}>
                  {cat} <span style={{float:"right",opacity:0.6,fontSize:12}}>{count}</span>
                </button>
              );
            })}
          </div>

          <label style={{display:"flex",alignItems:"center",gap:8,color:"#a8a8b3",marginBottom:24,cursor:"pointer",fontSize:14}}>
            <input type="checkbox" checked={shuffled} onChange={e=>setShuffled(e.target.checked)}
              style={{width:18,height:18,accentColor:"#e94560"}} />
            Shuffle questions
          </label>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <button onClick={startStudy}
              style={{padding:"18px 24px",background:"linear-gradient(135deg,#0f3460,#16213e)",
                border:"2px solid #e94560",borderRadius:16,color:"#e94560",fontSize:18,fontWeight:700,
                cursor:"pointer",transition:"all 0.2s"}}>
              📖 Study Mode
              <div style={{fontSize:11,fontWeight:400,marginTop:4,opacity:0.7}}>Flip cards to learn</div>
            </button>
            <button onClick={startQuiz}
              style={{padding:"18px 24px",background:"linear-gradient(135deg,#e94560,#c0392b)",
                border:"none",borderRadius:16,color:"#fff",fontSize:18,fontWeight:700,
                cursor:"pointer",transition:"all 0.2s"}}>
              🎯 Quiz Mode
              <div style={{fontSize:11,fontWeight:400,marginTop:4,opacity:0.8}}>Test yourself</div>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // STUDY MODE
  if (mode === "study") {
    const sq = questions[currentIdx];
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"20px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{maxWidth:650,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <button onClick={()=>setMode("menu")} style={{background:"none",border:"none",color:"#e94560",cursor:"pointer",fontSize:16,fontWeight:600}}>← Back</button>
            <span style={{color:"#a8a8b3",fontSize:14}}>{currentIdx+1} / {questions.length}</span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:2,marginBottom:20}}>
            <div style={{height:4,background:"#e94560",borderRadius:2,width:progress+"%",transition:"width 0.3s"}} />
          </div>

          <div onClick={()=>setFlipped(!flipped)}
            style={{
              background: flipped ? "rgba(233,69,96,0.1)" : "rgba(255,255,255,0.05)",
              border: flipped ? "2px solid #e94560" : "2px solid rgba(255,255,255,0.15)",
              borderRadius:20,padding:30,minHeight:300,cursor:"pointer",transition:"all 0.3s",
              display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center"
            }}>
            {!flipped ? (
              <>
                <div style={{color:"#e94560",fontSize:12,fontWeight:600,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>{sq.category}</div>
                <div style={{color:"#eee",fontSize:20,fontWeight:600,lineHeight:1.5}}>{sq.question}</div>
                {(sq.type === "image_question" && sq.image && IMG[sq.image]) && (
                  <img src={IMG[sq.image]} alt="" style={{maxWidth:300,maxHeight:200,borderRadius:12,marginTop:16,objectFit:"cover"}} />
                )}
                <div style={{color:"#666",fontSize:13,marginTop:20}}>Tap to reveal answer</div>
              </>
            ) : (
              <>
                <div style={{color:"#e94560",fontSize:14,fontWeight:600,marginBottom:12}}>✓ Answer</div>
                <div style={{color:"#2ecc71",fontSize:20,fontWeight:700,lineHeight:1.5}}>
                  {sq.type === "multi_select" ? sq.correct.map(i=>sq.options[i]).join(", ") :
                   sq.type === "fill_order" ? sq.correct.map((i,idx)=>sq.options[i]).join(" → ") :
                   sq.options[sq.correct]}
                </div>
                <div style={{color:"#a8a8b3",fontSize:14,marginTop:16,lineHeight:1.6}}>{sq.explanation}</div>
              </>
            )}
          </div>

          <div style={{display:"flex",gap:12,marginTop:20,justifyContent:"center"}}>
            <button disabled={currentIdx===0} onClick={()=>{setCurrentIdx(i=>i-1);setFlipped(false)}}
              style={{padding:"12px 24px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#ccc",cursor:currentIdx===0?"not-allowed":"pointer",fontSize:15,opacity:currentIdx===0?0.4:1}}>
              ← Prev
            </button>
            <button disabled={currentIdx===questions.length-1} onClick={()=>{setCurrentIdx(i=>i+1);setFlipped(false)}}
              style={{padding:"12px 24px",background:"#e94560",border:"none",borderRadius:12,color:"#fff",cursor:currentIdx===questions.length-1?"not-allowed":"pointer",fontSize:15,fontWeight:600,opacity:currentIdx===questions.length-1?0.4:1}}>
              Next →
            </button>
          </div>
        </div>
      </div>
    );
  }

  // RESULTS
  if (mode === "results") {
    const pct = Math.round(score / questions.length * 100);
    const wrongOnes = answers.filter(a => !a.correct).map(a => ALL_QUESTIONS.find(q => q.id === a.questionId));
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"20px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{maxWidth:650,margin:"0 auto",paddingTop:30}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <div style={{fontSize:64,marginBottom:8}}>{pct === 100 ? "🏆" : pct >= 80 ? "🌟" : pct >= 60 ? "👍" : "📚"}</div>
            <h2 style={{color:"#eee",fontSize:28,margin:0}}>
              {pct === 100 ? "PERFECT SCORE!" : pct >= 80 ? "Great work!" : pct >= 60 ? "Good effort!" : "Keep studying!"}
            </h2>
            <div style={{fontSize:48,fontWeight:800,color: pct >= 80 ? "#2ecc71" : pct >= 60 ? "#f39c12" : "#e94560",marginTop:12}}>
              {score}/{questions.length}
            </div>
            <div style={{color:"#a8a8b3",fontSize:16,marginTop:4}}>{pct}% correct</div>
          </div>

          {wrongOnes.length > 0 && (
            <div style={{marginBottom:24}}>
              <h3 style={{color:"#e94560",fontSize:16,marginBottom:12}}>Review these questions:</h3>
              {wrongOnes.map((wq,i) => wq && (
                <div key={i} style={{background:"rgba(233,69,96,0.1)",border:"1px solid rgba(233,69,96,0.3)",borderRadius:12,padding:16,marginBottom:10}}>
                  <div style={{color:"#eee",fontSize:14,fontWeight:600,marginBottom:8}}>{wq.question}</div>
                  <div style={{color:"#2ecc71",fontSize:13}}>✓ {wq.type === "multi_select" ? wq.correct.map(i=>wq.options[i]).join(", ") : wq.options[wq.correct]}</div>
                  <div style={{color:"#a8a8b3",fontSize:12,marginTop:6}}>{wq.explanation}</div>
                </div>
              ))}
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <button onClick={()=>setMode("menu")}
              style={{padding:"14px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#ccc",cursor:"pointer",fontSize:15}}>
              ← Menu
            </button>
            <button onClick={startQuiz}
              style={{padding:"14px",background:"#e94560",border:"none",borderRadius:12,color:"#fff",cursor:"pointer",fontSize:15,fontWeight:600}}>
              Try Again 🔄
            </button>
          </div>
        </div>
      </div>
    );
  }

  // QUIZ MODE
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"20px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{maxWidth:650,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setMode("menu")} style={{background:"none",border:"none",color:"#e94560",cursor:"pointer",fontSize:15,fontWeight:600}}>← Back</button>
          <span style={{color:"#a8a8b3",fontSize:14}}>Score: {score}/{currentIdx + (showAnswer ? 1 : 0)}</span>
          <span style={{color:"#a8a8b3",fontSize:14}}>{currentIdx+1}/{questions.length}</span>
        </div>
        <div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:2,marginBottom:16}}>
          <div style={{height:4,background:"#e94560",borderRadius:2,width:progress+"%",transition:"width 0.3s"}} />
        </div>

        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:24,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:"#e94560",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{q.category}</span>
            <span style={{color:"#666",fontSize:11,background:"rgba(255,255,255,0.06)",padding:"3px 10px",borderRadius:20}}>
              {q.type === "image_question" ? "🖼️ Image" : q.type === "multi_select" ? "☑️ Multi" : q.type === "fill_order" ? "🔢 Order" : "📝 Single"}
            </span>
          </div>
          <div style={{color:"#eee",fontSize:18,fontWeight:600,lineHeight:1.5,whiteSpace:"pre-line"}}>{q.question}</div>
          
          {(q.type === "image_question" && q.image && IMG[q.image]) && (
            <div style={{position:"relative",marginTop:16,display:"inline-block"}}>
              <img src={IMG[q.image]} alt="" style={{maxWidth:"100%",maxHeight:220,borderRadius:12,objectFit:"cover"}} />
            </div>
          )}
        </div>

        {/* OPTIONS */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {q.options.map((opt, idx) => {
            let bg = "rgba(255,255,255,0.04)";
            let border = "1px solid rgba(255,255,255,0.1)";
            let textColor = "#ddd";

            if (showAnswer) {
              const isCorrectOption = q.type === "multi_select" || q.type === "fill_order" ? q.correct.includes(idx) : idx === q.correct;
              const isSelectedOption = q.type === "multi_select" || q.type === "fill_order" ? multiSelected.includes(idx) : idx === selected;
              if (isCorrectOption) { bg = "rgba(46,204,113,0.15)"; border = "2px solid #2ecc71"; textColor = "#2ecc71"; }
              else if (isSelectedOption && !isCorrectOption) { bg = "rgba(233,69,96,0.15)"; border = "2px solid #e94560"; textColor = "#e94560"; }
            } else {
              const isSel = q.type === "multi_select" || q.type === "fill_order" ? multiSelected.includes(idx) : idx === selected;
              if (isSel) { bg = "rgba(233,69,96,0.15)"; border = "2px solid #e94560"; textColor = "#e94560"; }
            }

            return (
              <button key={idx} disabled={showAnswer}
                onClick={() => {
                  if (q.type === "multi_select") {
                    setMultiSelected(prev => prev.includes(idx) ? prev.filter(i=>i!==idx) : [...prev, idx]);
                  } else if (q.type === "fill_order") {
                    setMultiSelected(prev => prev.includes(idx) ? prev.filter(i=>i!==idx) : [...prev, idx]);
                  } else {
                    setSelected(idx);
                  }
                }}
                style={{padding:"14px 18px",background:bg,border,borderRadius:12,color:textColor,
                  cursor:showAnswer?"default":"pointer",fontSize:15,textAlign:"left",transition:"all 0.2s",
                  display:"flex",alignItems:"center",gap:10}}>
                <span style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                  background:"rgba(255,255,255,0.06)",fontSize:13,fontWeight:600,flexShrink:0}}>
                  {String.fromCharCode(65+idx)}
                </span>
                {opt}
                {q.type === "fill_order" && multiSelected.includes(idx) && (
                  <span style={{marginLeft:"auto",background:"#e94560",color:"#fff",width:22,height:22,borderRadius:"50%",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>
                    {multiSelected.indexOf(idx)+1}
                  </span>
                )}
              </button>
            );
          })}
        </div>

        {/* EXPLANATION */}
        {showAnswer && (
          <div style={{background:"rgba(46,204,113,0.08)",border:"1px solid rgba(46,204,113,0.2)",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{color:"#2ecc71",fontSize:13,fontWeight:600,marginBottom:6}}>
              {answers[answers.length-1]?.correct ? "✓ Correct!" : "✗ Incorrect"}
            </div>
            <div style={{color:"#a8a8b3",fontSize:14,lineHeight:1.5}}>{q.explanation}</div>
          </div>
        )}

        {/* ACTION BUTTON */}
        {!showAnswer ? (
          <button onClick={handleQuizAnswer}
            disabled={(q.type === "multi_select" || q.type === "fill_order") ? multiSelected.length === 0 : selected === null}
            style={{width:"100%",padding:"16px",background:"#e94560",border:"none",borderRadius:14,color:"#fff",
              fontSize:17,fontWeight:700,cursor:((q.type === "multi_select" || q.type === "fill_order") ? multiSelected.length === 0 : selected === null)?"not-allowed":"pointer",
              opacity:((q.type === "multi_select" || q.type === "fill_order") ? multiSelected.length === 0 : selected === null)?0.4:1,
              transition:"all 0.2s"}}>
            Check Answer
          </button>
        ) : (
          <button onClick={nextQuestion}
            style={{width:"100%",padding:"16px",background:"#2ecc71",border:"none",borderRadius:14,color:"#fff",
              fontSize:17,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>
            {currentIdx < questions.length - 1 ? "Next Question →" : "See Results 🏆"}
          </button>
        )}
      </div>
    </div>
  );
}


    ReactDOM.render(<FlashcardApp />, document.getElementById('root'));
  </script>
</body>
</html>
